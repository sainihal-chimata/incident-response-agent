name: incident-response-agent
version: "1.0.0"

description: >
  An SRE simulation environment for automated incident response.
  The agent must investigate logs, metrics, and database states
  to resolve system outages across three difficulty levels.

entrypoint: uvicorn app:app --host 0.0.0.0 --port 7860
language: python

tasks:
  - id: easy
    description: Basic service restart with log investigation.
    grader: server.graders.grade_easy
  - id: medium
    description: CPU spike requiring metric checking and scaling.
    grader: server.graders.grade_medium
  - id: hard
    description: Complex outage with randomized root causes (DB vs CPU).
    grader: server.graders.grade_hard

action_space:
  type: discrete
  actions:
    - check_logs
    - check_metrics
    - check_db
    - restart_service
    - scale_service
    - fix_db

observation_space:
  type: object
  properties:
    status:
      type: string
    alert:
      type: string
    logs:
      type: string
      nullable: true
    logs_checked:
      type: boolean
    cpu:
      type: integer
      nullable: true
    metrics_checked:
      type: boolean
    db_status:
      type: string
      nullable: true
    db_checked:
      type: boolean

tags:
  - incident-response
  - site-reliability-engineering
  - llm-agent
  - automation

