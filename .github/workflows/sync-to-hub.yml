name: Sync to Hugging Face Hub
on:
  push:
    branches: [main]
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        uses: huggingface/hub-sync@v1.0
        with:
          github_repo_id: ${{ github.repository }}
          huggingface_repo_id: username/my-repo
          hf_token: ${{ secrets.HF_TOKEN }}
